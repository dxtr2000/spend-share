services:
  spend-share:
    build:
      context: .
    image: spend-share:latest
    container_name: spend-share
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATA_DIR: /app/data
      PUBLIC_DIR: /app/frontend/dist
    ports:
      - "${SPEND_SHARE_PORT:-3001}:3001"
    volumes:
      - spend-share-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  spend-share-data:
